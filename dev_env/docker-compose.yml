services:
  reverse-proxy:
    image: nginx
    depends_on:
      create_certificates:
        condition: service_completed_successfully
    ports:
      - 443:443
    volumes:
      - ./reverse-proxy/config:/etc/nginx/templates/
      - certificates:/etc/nginx/certs:ro
    environment:
      - UPSTREAM_PORT=3000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  create_certificates:
    image: alpine
    command: |
      /bin/sh -c "
      apk add --no-cache openssl &&
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /certs/local.key -out /certs/local.crt -subj '/CN=localhost' &&
      chown 101:101 /certs/local.key /certs/local.crt
      "
    volumes:
      - certificates:/certs

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - 54320:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:12.2
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - 4000:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - grafana-tempo
      - prometheus
    profiles:
      - monitoring

  grafana-tempo:
    image: grafana/tempo:2.10.5
    command: "-config.file=/etc/tempo.yaml"
    volumes:
      - ./grafana-tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    profiles:
      - monitoring

  grafana-alloy:
    image: grafana/alloy:v1.10.1
    ports:
      # The application runs on the host system, thus we need to expose the ingestion ports here
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./grafana-alloy/config.alloy:/etc/alloy/config.alloy:ro
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    profiles:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      # needed for pushing metrics from tempo
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

volumes:
  certificates:
  postgres_data:
  grafana_data:
  tempo_data:
